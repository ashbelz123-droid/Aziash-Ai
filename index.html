<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love AI</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

header {
  padding: 15px;
  background: #1e293b;
  text-align: center;
  font-weight: bold;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.msg {
  padding: 12px;
  border-radius: 12px;
  max-width: 80%;
}

.user {
  background: #2563eb;
  align-self: flex-end;
}

.bot {
  background: #1e293b;
  align-self: flex-start;
}

.option {
  background: #334155;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

.option:hover {
  background: #475569;
}

#inputBox {
  display: flex;
  padding: 10px;
  background: #1e293b;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 8px;
  border: none;
  outline: none;
}

button {
  margin-left: 10px;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #22c55e;
  color: white;
}
</style>
</head>

<body>

<header>💬 Love AI Assistant</header>

<div id="chat"></div>

<div id="inputBox">
  <input id="input" placeholder="Type your situation..." />
  <button onclick="send()">Send</button>
</div>

<script>

// ===== STATE =====
let stage = "start"; // start → chatting → deep

// ===== UI =====
function addMessage(text, type) {
  const chat = document.getElementById("chat");

  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// ===== HELPERS =====
function randomPick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function pickBestReply(replies) {
  return replies.sort((a, b) => a.length - b.length)[0];
}

// ===== COACH =====
function getCoaching(stage) {
  if (stage === "start") return "Start simple. Don’t try too hard.";
  if (stage === "chatting") return "Keep it natural. Don’t overthink.";
  if (stage === "deep") return "Stay calm. Don’t react emotionally.";
  return "Stay relaxed.";
}

// ===== BRAIN =====
function generateSmartResponse(msg) {
  msg = msg.toLowerCase();

  // START STAGE
  if (stage === "start") {
    if (msg.includes("hi") || msg.includes("hello")) {
      stage = "chatting";
      return {
        advice: "Keep it simple and friendly.",
        replies: [
          "Hey, how are you?",
          "Hi, what’s up?",
          "Hey 😊"
        ]
      };
    }
  }

  // CHAT STAGE
  if (stage === "chatting") {

    // detect deeper topics
    if (
      msg.includes("love") ||
      msg.includes("ignore") ||
      msg.includes("distance") ||
      msg.includes("problem") ||
      msg.includes("pulling away")
    ) {
      stage = "deep";
    }

    return {
      advice: "Keep conversation flowing.",
      replies: [
        randomPick(["Haha yeah", "That’s interesting", "I get you"]),
        randomPick(["What have you been up to?", "Tell me more", "How was your day?"]),
        randomPick(["You seem chill", "I like your vibe", "You’re easy to talk to"])
      ]
    };
  }

  // DEEP STAGE
  if (stage === "deep") {
    return {
      advice: "Stay calm and don’t overreact.",
      replies: [
        randomPick([
          "I understand where you're coming from",
          "Let’s not overcomplicate it",
          "We can sort it out"
        ]),
        randomPick([
          "I’m just keeping things simple",
          "No pressure from me",
          "Let’s stay calm"
        ]),
        randomPick([
          "We’ll talk it through",
          "It’s not that serious",
          "We’re good"
        ])
      ]
    };
  }

  // DEFAULT
  return {
    advice: "Stay natural.",
    replies: ["Alright", "Okay", "I hear you"]
  };
}

// ===== MAIN SEND =====
function send() {
  const input = document.getElementById("input");
  const text = input.value;

  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  const result = generateSmartResponse(text);
  const coach = getCoaching(stage);
  const best = pickBestReply(result.replies);

  // Coach
  setTimeout(() => {
    addMessage("Coach: " + coach, "bot");
  }, 300);

  // Best Reply
  setTimeout(() => {
    addMessage("Best: " + best, "bot");
  }, 600);

  // Options
  setTimeout(() => {
    result.replies.forEach(reply => {
      const chat = document.getElementById("chat");

      const option = document.createElement("div");
      option.className = "option";
      option.innerText = reply;

      if (reply === best) {
        option.style.border = "2px solid #22c55e";
      }

      option.onclick = () => {
        addMessage(reply, "user");
        option.remove();
      };

      chat.appendChild(option);
    });
  }, 900);
}

</script>

</body>
</html>
