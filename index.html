<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love AI</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

header {
  padding: 15px;
  background: #1e293b;
  text-align: center;
  font-weight: bold;
}

#chat {
  height: 75vh;
  overflow-y: auto;
  padding: 10px;
}

.msg {
  margin: 8px 0;
  padding: 10px;
  border-radius: 10px;
  max-width: 75%;
}

.user {
  background: #2563eb;
  margin-left: auto;
  text-align: right;
}

.bot {
  background: #1e293b;
}

.option {
  background: #334155;
  padding: 8px;
  margin-top: 5px;
  border-radius: 6px;
  cursor: pointer;
}

.option:hover {
  background: #475569;
}

#inputBox {
  display: flex;
  padding: 10px;
  background: #1e293b;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
  outline: none;
}

button {
  margin-left: 10px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #22c55e;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<header>💬 Love AI Assistant</header>

<div id="chat"></div>

<div id="inputBox">
  <input id="input" placeholder="Type message..." />
  <button onclick="send()">Send</button>
</div>

<script>

// ADD MESSAGE
function addMessage(text, type) {
  const chat = document.getElementById("chat");

  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// RANDOM PICK
function randomPick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

// SMART RESPONSE
function generateSmartResponse(msg) {
  msg = msg.toLowerCase();

  // GREETINGS
  if (msg.includes("hi") || msg.includes("hello")) {
    return {
      advice: "Keep it light and natural.",
      replies: [
        randomPick(["Hey", "Hey you", "Hi"]),
        randomPick(["What’s up?", "How you been?", "You good?"]),
        randomPick(["Nice hearing from you", "What’s going on", "You disappeared 😄"])
      ]
    };
  }

  // IGNORING
  if (msg.includes("ignore")) {
    return {
      advice: "Stay calm, don’t chase too much.",
      replies: [
        randomPick([
          "I’ve just been a bit busy",
          "Not ignoring you, just needed time",
          "Been off for a bit"
        ]),
        randomPick([
          "Relax, nothing serious",
          "Don’t overthink it",
          "You’re reading too much into it"
        ]),
        randomPick([
          "We’ll talk properly later",
          "I’ll explain when we talk",
          "No stress, we’ll sort it"
        ])
      ]
    };
  }

  // LOVE
  if (msg.includes("love")) {
    return {
      advice: "Be honest but not too intense.",
      replies: [
        randomPick([
          "I do care about you",
          "You matter to me",
          "I’m here for you"
        ]),
        randomPick([
          "I just don’t say too much",
          "I’m not loud with it",
          "I keep things simple"
        ]),
        randomPick([
          "But yeah, it’s real",
          "Just understand me a bit",
          "It’s not fake"
        ])
      ]
    };
  }

  // ANGER
  if (msg.includes("angry") || msg.includes("mad")) {
    return {
      advice: "Don’t react fast. Stay calm.",
      replies: [
        randomPick([
          "Let’s not make it bigger than it is",
          "I hear you, let’s stay calm",
          "No need to argue"
        ]),
        randomPick([
          "We’ll figure it out",
          "It’s not that serious",
          "Relax a bit"
        ]),
        randomPick([
          "We’ll talk properly",
          "Give it a moment",
          "We’re good"
        ])
      ]
    };
  }

  // DEFAULT
  return {
    advice: "Stay calm and don’t overcomplicate.",
    replies: [
      randomPick(["Alright", "I hear you", "Okay"]),
      randomPick(["Let’s keep it simple", "No stress", "We’ll sort it"]),
      randomPick(["We’ll talk", "It’s fine", "Relax"])
    ]
  };
}

// SEND MESSAGE
function send() {
  const input = document.getElementById("input");
  const text = input.value;

  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  const result = generateSmartResponse(text);

  // show advice
  setTimeout(() => {
    addMessage("Advice: " + result.advice, "bot");

    // show reply options
    result.replies.forEach(reply => {
      const chat = document.getElementById("chat");

      const option = document.createElement("div");
      option.className = "option";
      option.innerText = reply;

      option.onclick = () => {
        addMessage(reply, "user");
        option.remove();
      };

      chat.appendChild(option);
    });

  }, 400);
}

</script>

</body>
</html>
