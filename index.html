<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love AI</title>

<style>
body { font-family: Arial; background:#0f172a; color:white; padding:10px; }
input { width:70%; padding:10px; border-radius:6px; border:none; }
button { padding:10px; border:none; background:#22c55e; color:white; border-radius:6px; }
.option { background:#1e293b; margin:6px 0; padding:10px; border-radius:6px; cursor:pointer; }
.option:hover { background:#334155; }
</style>
</head>

<body>

<h3>💬 Love AI</h3>

<input id="input" placeholder="Type message..." />
<button onclick="send()">Send</button>

<div id="chat"></div>

<script>
function send() {
  const input = document.getElementById("input").value;
  if (!input) return;

  const result = generateSmartResponse(input);
  display(result);
}

function generateSmartResponse(msg) {
  msg = msg.toLowerCase();

  // SIMPLE GREETINGS
  if (msg.includes("hi") || msg.includes("hello")) {
    return {
      advice: "Keep it simple and friendly.",
      replies: [
        "Hey, how are you?",
        "Hi, what’s up?",
        "Hey there"
      ]
    };
  }

  // IGNORING / DRAMA
  if (msg.includes("ignore")) {
    return {
      advice: "Stay calm. Don’t chase. Let her come.",
      replies: [
        "I’m not ignoring, just been busy.",
        "Relax, I needed some time.",
        "We’ll talk, no stress."
      ]
    };
  }

  // LOVE QUESTIONS
  if (msg.includes("love")) {
    return {
      advice: "Be honest but don’t overdo it.",
      replies: [
        "I care about you, I just don’t rush things.",
        "You matter to me, just keeping it simple.",
        "I’m here, just not loud about it."
      ]
    };
  }

  // ANGER / ARGUMENT
  if (msg.includes("angry") || msg.includes("mad")) {
    return {
      advice: "Don’t react fast. Stay calm and controlled.",
      replies: [
        "Let’s not make it bigger than it is.",
        "I hear you, let’s keep it calm.",
        "No need to argue, we’ll sort it."
      ]
    };
  }

  // DEFAULT (SMART FALLBACK)
  return {
    advice: "Stay calm, be clear, don’t overreact.",
    replies: [
      "Alright, I hear you.",
      "Let’s keep it simple.",
      "No stress, we’ll talk."
    ]
  };
}

function display(data) {
  let html = `<p><b>Advice:</b> ${data.advice}</p>`;

  data.replies.forEach(r => {
    html += `<div class="option">${r}</div>`;
  });

  document.getElementById("chat").innerHTML = html;
}
</script>

</body>
</html>
