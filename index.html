<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love AI</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

header {
  padding: 15px;
  background: #1e293b;
  text-align: center;
  font-weight: bold;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.msg {
  padding: 12px;
  border-radius: 12px;
  max-width: 80%;
}

.user {
  background: #2563eb;
  align-self: flex-end;
}

.bot {
  background: #1e293b;
  align-self: flex-start;
}

.option {
  background: #334155;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

.option:hover {
  background: #475569;
}

#inputBox {
  display: flex;
  padding: 10px;
  background: #1e293b;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 8px;
  border: none;
  outline: none;
}

button {
  margin-left: 10px;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #22c55e;
  color: white;
}
</style>
</head>

<body>

<header>💬 Love AI Assistant</header>

<div id="chat"></div>

<div id="inputBox">
  <input id="input" placeholder="Type your situation..." />
  <button onclick="send()">Send</button>
</div>

<script>

// ===== STATE =====
let stage = "start";

// ===== UI =====
function addMessage(text, type) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// ===== HELPERS =====
function randomPick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function pickBestReply(replies) {
  return replies.sort((a, b) => a.length - b.length)[0];
}

// ===== COACH =====
function getCoaching(stage) {
  if (stage === "start") return "Start simple. Don’t try too hard.";
  if (stage === "chatting") return "Keep it natural. Don’t overthink.";
  if (stage === "deep") return "Stay calm. Don’t react emotionally.";
  return "Stay relaxed.";
}

// ===== FULL LOVE BRAIN =====
function generateSmartResponse(msg) {
  msg = msg.toLowerCase();

  // LOVE
  if (msg.includes("love") || msg.includes("like someone")) {
    stage = "deep";
    return {
      advice: "Be calm and real. Don’t rush feelings.",
      replies: [
        randomPick(["I care about you, just keeping it simple"]),
        randomPick(["I’m not rushing anything, just being real"]),
        randomPick(["Let’s just enjoy it naturally"])
      ]
    };
  }

  // IGNORING
  if (msg.includes("ignore") || msg.includes("not replying")) {
    stage = "deep";
    return {
      advice: "Don’t chase. Give space.",
      replies: [
        randomPick(["I’ve just been busy"]),
        randomPick(["Not ignoring you, just needed time"]),
        randomPick(["We’ll talk later, no stress"])
      ]
    };
  }

  // DISTANCE
  if (msg.includes("distance") || msg.includes("pulling away") || msg.includes("changed")) {
    stage = "deep";
    return {
      advice: "Stay calm and don’t pressure.",
      replies: [
        randomPick(["You’ve been a bit distant lately"]),
        randomPick(["Everything okay with you?"]),
        randomPick(["Just checking in, no pressure"])
      ]
    };
  }

  // JEALOUSY
  if (msg.includes("jealous") || msg.includes("ex") || msg.includes("another")) {
    stage = "deep";
    return {
      advice: "Stay in control. Don’t react emotionally.",
      replies: [
        randomPick(["I don’t do drama, I keep it simple"]),
        randomPick(["I just observe, no pressure"]),
        randomPick(["Let’s keep things clear"])
      ]
    };
  }

  // ARGUMENT
  if (msg.includes("angry") || msg.includes("fight") || msg.includes("argue")) {
    stage = "deep";
    return {
      advice: "Stay calm. Don’t escalate.",
      replies: [
        randomPick(["Let’s not make it bigger"]),
        randomPick(["I hear you, let’s stay calm"]),
        randomPick(["We’ll sort it out"])
      ]
    };
  }

  // STARTING CHAT
  if (msg.includes("start") || msg.includes("first message")) {
    stage = "chatting";
    return {
      advice: "Keep it simple and confident.",
      replies: [
        randomPick(["Hey, I wanted to say hi"]),
        randomPick(["You seem interesting"]),
        randomPick(["Hi, what’s up?"])
      ]
    };
  }

  // FLIRTING
  if (msg.includes("flirt")) {
    stage = "chatting";
    return {
      advice: "Be playful, not try-hard.",
      replies: [
        randomPick(["You’re trouble 😄"]),
        randomPick(["I like your vibe"]),
        randomPick(["You’re interesting"])
      ]
    };
  }

  // CONFUSION
  if (msg.includes("confused") || msg.includes("mixed")) {
    stage = "deep";
    return {
      advice: "Observe more, don’t chase clarity.",
      replies: [
        randomPick(["I’m just keeping things simple"]),
        randomPick(["No pressure from me"]),
        randomPick(["Let’s see how it goes"])
      ]
    };
  }

  // GREETING
  if (stage === "start" && (msg.includes("hi") || msg.includes("hello"))) {
    stage = "chatting";
    return {
      advice: "Keep it simple and friendly.",
      replies: ["Hey 😊", "Hi, what’s up?", "Hey, how are you?"]
    };
  }

  // NORMAL CHAT
  if (stage === "chatting") {
    return {
      advice: "Keep conversation flowing.",
      replies: [
        randomPick(["Haha yeah"]),
        randomPick(["Tell me more"]),
        randomPick(["You’re easy to talk to"])
      ]
    };
  }

  // DEEP DEFAULT
  if (stage === "deep") {
    return {
      advice: "Stay calm and clear.",
      replies: [
        randomPick(["I understand"]),
        randomPick(["Let’s keep it simple"]),
        randomPick(["We’ll figure it out"])
      ]
    };
  }

  return {
    advice: "Stay natural.",
    replies: ["Alright", "Okay", "I hear you"]
  };
}

// ===== SEND =====
function send() {
  const input = document.getElementById("input");
  const text = input.value;

  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  const result = generateSmartResponse(text);
  const coach = getCoaching(stage);
  const best = pickBestReply(result.replies);

  setTimeout(() => addMessage("Coach: " + coach, "bot"), 300);
  setTimeout(() => addMessage("Best: " + best, "bot"), 600);

  setTimeout(() => {
    result.replies.forEach(reply => {
      const chat = document.getElementById("chat");

      const option = document.createElement("div");
      option.className = "option";
      option.innerText = reply;

      if (reply === best) {
        option.style.border = "2px solid #22c55e";
      }

      option.onclick = () => {
        addMessage(reply, "user");
        option.remove();
      };

      chat.appendChild(option);
    });
  }, 900);
}

</script>

</body>
</html>
