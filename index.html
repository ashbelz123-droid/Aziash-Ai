<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love AI</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* HEADER */
header {
  padding: 15px;
  background: #1e293b;
  text-align: center;
  font-weight: bold;
}

/* CHAT AREA */
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* MESSAGES */
.msg {
  padding: 12px;
  border-radius: 12px;
  max-width: 80%;
  line-height: 1.4;
}

.user {
  background: #2563eb;
  align-self: flex-end;
}

.bot {
  background: #1e293b;
  align-self: flex-start;
}

/* OPTIONS */
.option {
  background: #334155;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 5px;
}

.option:hover {
  background: #475569;
}

/* INPUT */
#inputBox {
  display: flex;
  padding: 10px;
  background: #1e293b;
  border-top: 1px solid #334155;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 8px;
  border: none;
  outline: none;
}

button {
  margin-left: 10px;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #22c55e;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<header>💬 Love AI Assistant</header>

<div id="chat"></div>

<div id="inputBox">
  <input id="input" placeholder="Type your situation..." />
  <button onclick="send()">Send</button>
</div>

<script>

// ADD MESSAGE
function addMessage(text, type) {
  const chat = document.getElementById("chat");

  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// RANDOM PICK
function randomPick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

// BEST REPLY
function pickBestReply(replies) {
  return replies.sort((a, b) => a.length - b.length)[0];
}

// COACH
function getCoaching(msg) {
  msg = msg.toLowerCase();

  if (msg.includes("ignore")) return "Don’t chase. Stay calm.";
  if (msg.includes("pulling away")) return "Give space, don’t pressure.";
  if (msg.includes("love")) return "Be real, don’t overdo it.";
  if (msg.includes("angry")) return "Control your reaction.";
  
  return "Stay calm and simple.";
}

// MAIN BRAIN
function generateSmartResponse(msg) {
  msg = msg.toLowerCase();

  if (msg.includes("hi") || msg.includes("hello")) {
    return {
      advice: "Keep it light.",
      replies: [
        randomPick(["Hey", "Hi", "Hey you"]),
        randomPick(["What’s up?", "You good?", "How you been?"]),
        randomPick(["Nice hearing from you", "What’s going on", "You disappeared 😄"])
      ]
    };
  }

  if (msg.includes("pulling away") || msg.includes("distance")) {
    return {
      advice: "Don’t chase. Stay calm.",
      replies: [
        randomPick(["You seem distant lately", "Everything okay?", "You’ve been different"]),
        randomPick(["No pressure from me", "Just checking in", "Keeping it simple"]),
        randomPick(["We’ll talk when ready", "I’m here", "No stress"])
      ]
    };
  }

  return {
    advice: "Stay calm.",
    replies: [
      randomPick(["Alright", "Okay", "I hear you"]),
      randomPick(["Let’s keep it simple", "No stress", "We’ll talk"]),
      randomPick(["Relax", "It’s fine", "We’ll sort it"])
    ]
  };
}

// SEND
function send() {
  const input = document.getElementById("input");
  const text = input.value;

  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  const result = generateSmartResponse(text);
  const coach = getCoaching(text);
  const best = pickBestReply(result.replies);

  // Coach
  setTimeout(() => {
    addMessage("Coach: " + coach, "bot");
  }, 300);

  // Best reply
  setTimeout(() => {
    addMessage("Best: " + best, "bot");
  }, 600);

  // Options
  setTimeout(() => {
    result.replies.forEach(reply => {
      const chat = document.getElementById("chat");

      const option = document.createElement("div");
      option.className = "option";
      option.innerText = reply;

      if (reply === best) {
        option.style.border = "2px solid #22c55e";
      }

      option.onclick = () => {
        addMessage(reply, "user");
        option.remove();
      };

      chat.appendChild(option);
    });

  }, 900);
}

</script>

</body>
</html>
